<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form7</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

</head>



<body>
  <section class="container">
  <h1 class="header">APPLY FOR INTERNSHIP HERE</h1>
      <form action="/">
        <div class="application">
          <label for="firstname" class="label">First Name:</label>
          <input type="firstname" id="firstname" required class="input"/> 
        </div>
       
    

        <div class="application">
          <label for="lastname" class="label">Last Name:</label>
          <input type="lastname" id="lastname" required class="input"/>
        </div>

       

        <div class="application">
          <label for="email" class="label">Email:</label>
          <input type="email" id="email" name="email" required class="input"/>
        </div>

        <div class="application">
          <label for="phonenumber" class="label">Phonenumber:</label>
          <input type="tel" id="phonenumber" name="phonenumber" required class="input"/>
        </div>


        <div class="application">
          <label for="application" class="label">Department:</label>
          <select name="application" id="application" required class="input">
            <option value="application1">HR</option>
            <option value="application2">IT</option>
            <option value="application3">Sales</option>
            <option value="application4">Marketing</option>
            <option value="application5">Engineering</option>
            <option value="application6">Facilities & Administration</option>
          </select>
        </div>
       

        <div class="application">
          <label for="message" class="label">Message:</label>
          <textarea
            name="message"
            id="message"
            rows="1-20"
            placeholder="Additional optional information" class="message"></textarea>
        </div>

        <div>
          <button class="button" type="submit">Submit</button>
        </div>
      </form>

      </section>  
    </main>
    










</body>
</html>
